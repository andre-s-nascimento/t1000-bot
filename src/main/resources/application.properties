# Ativa inicialização preguiçosa
spring.main.lazy-initialization=true

spring.application.name=tmill-bot
spring.jmx.enabled=false
spring.threads.virtual.enabled=true

# Otimiza Jackson
spring.jackson.serialization.indent-output=false

# SQLite
spring.datasource.url=jdbc:sqlite:./data/t1000.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always

# Servidor
server.port=8082

# Limita conexões (evita picos de memória)
server.tomcat.max-connections=20
# Reduz threads do Tomcat (padrão é 200!)
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20

management.endpoints.access.default=NONE

# TMDB
tmdb.token=${TMDB_READ_TOKEN}
tmdb.api.url=https://api.themoviedb.org/3

# Groq
groq.api.key=${GROQ_API_KEY}
groq.max-refinement-length=10000

# Audio transcription (OpenAI local fallback, não usado quando Groq está ativo)
openai.api.url=http://localhost:10300/v1/audio/transcriptions
openai.api.key=sk-local-no-key-needed

# Feature flags
t1000.features.transcription-enabled=${TRANSCRIPTION_ENABLED:false}
t1000.audio.max-size-mb=20
telegram.message.limit=4000

# -------------------------------------------------------
# Google OAuth2 — Blogger API
# Gere o refresh_token uma única vez com o script abaixo
# e salve como variável de ambiente GOOGLE_REFRESH_TOKEN
# -------------------------------------------------------
google.oauth2.client-id=${GOOGLE_CLIENT_ID}
google.oauth2.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth2.refresh-token=${GOOGLE_REFRESH_TOKEN}

# ID do seu blog no Blogger (aparece na URL do painel: blogger.com/blog/posts/SEU_ID)
blogger.blog-id=${BLOGGER_BLOG_ID}

telegram.owner.id=${TELEGRAM_OWNER_ID}
telegram.bot.name=@t1000paneleiro_bot

user.log.directory=logs
logging.level.net.ddns.adambravo79.tmill=INFO

bot.token=${TELEGRAM_BOT_TOKEN}
bot.allowed-chats=${BOT_ALLOWED_CHATS:}
ideas.log.directory=logs

# Caminho do arquivo de easter eggs (pode ser sobrescrito via .env)
# Padrão local: classpath; produção sobrepõe com file:/app/config/easter-eggs.json
easter-egg.file=${EASTER_EGG_FILE:classpath:easter-eggs.json}

# Digest diário
digest.enabled=true
digest.chat-ids=${DIGEST_ALLOWED_CHATS:}
# substitua pelo ID do grupo/canal onde deseja publicar

# Para testes, você pode também desabilitar e usar endpoint manual

# Cache de transcrições
cache.transcription.enabled=true
cache.transcription.ttl-seconds=86400