name: Create Release PR

on:
  push:
    branches:
      - "release/**"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          VERSION=$(echo "$BRANCH_NAME" | sed -E 's/^release\/v?//')
          PR_TITLE="chore: release v$VERSION"
          PR_BODY="## 🧾 Descrição\n\nRelease da versão $VERSION\n\n## ✅ Checklist\n- [ ] Revisão aprovada"
          gh pr create --base main --head "$BRANCH_NAME" --title "$PR_TITLE" --body "$PR_BODY" --label "release" || echo "PR may already exist"

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_TITLE="chore: release v${{ steps.vars.outputs.version }}"
          PR_BODY="## 🧾 Descripción\n\nRelease de la versión ${{ steps.vars.outputs.version }}"
          EXISTING_PR=$(gh pr list --base main --head "${{ github.ref_name }}" --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create --base main --head "${{ github.ref_name }}" --title "$PR_TITLE" --body "$PR_BODY" --label "release" || echo "Failed to create PR"
          else
            echo "PR already exists: https://github.com/${{ github.repository }}/pull/$EXISTING_PR"
          fi
