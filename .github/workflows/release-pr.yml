name: Create Release PR

on:
  push:
    branches:
      - "release/**"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from branch name
        id: vars
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          VERSION=$(echo "$BRANCH_NAME" | sed -E 's/^release\/v?//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_TITLE="chore: release v${{ steps.vars.outputs.version }}"
          PR_BODY="## 🧾 Descrição\n\nRelease da versão ${{ steps.vars.outputs.version }}\n\n## ✅ Checklist\n- [ ] Revisão aprovada"
          gh pr create --base main --head "${{ github.ref_name }}" --title "$PR_TITLE" --body "$PR_BODY" --label "release" || echo "PR may already exist"
