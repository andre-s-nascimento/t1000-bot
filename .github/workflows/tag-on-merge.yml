name: Tag on Main Merge

on:
  push:
    branches:
      - main

jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'Merge pull request')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
      - name: Extract version from merge commit message
        id: vars
        run: |
          PR_TITLE=$(git log -1 --pretty=%s)
          VERSION=$(echo "$PR_TITLE" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | sed 's/v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create tag
        if: steps.vars.outputs.version != ''
        run: |
          git tag -a "v${{ steps.vars.outputs.version }}" -m "Release v${{ steps.vars.outputs.version }}"
          git push origin "v${{ steps.vars.outputs.version }}"
