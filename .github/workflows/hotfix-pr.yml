name: Create Hotfix PR

on:
  push:
    branches:
      - "hotfix/**"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_TITLE="fix: hotfix $(echo ${{ github.ref_name }} | sed 's/hotfix\///')"
          PR_BODY="## 🧾 Descrição\n\nCorreção urgente.\n\n## 🧪 Como testar\n...\n## ✅ Checklist"
          gh pr create --base main --head "${{ github.ref_name }}" --title "$PR_TITLE" --body "$PR_BODY" --label "hotfix" || echo "PR already exists"
