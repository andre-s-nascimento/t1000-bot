name: Create Hotfix PR

on:
  push:
    branches:
      - "hotfix/**"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
      - name: Extract version (if present)
        id: vars
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          VERSION=$(echo "$BRANCH_NAME" | sed -E 's/^hotfix\/v?//' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Bump version if version detected
        if: steps.vars.outputs.version != ''
        run: |
          sed -i "s/^version = '.*'/version = '${{ steps.vars.outputs.version }}'/" build.gradle
          git add build.gradle
          git diff --staged --quiet || git commit -m "chore: bump hotfix version to ${{ steps.vars.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }}
      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_TITLE="fix: hotfix $(echo ${{ github.ref_name }} | sed 's/hotfix\///')"
          PR_BODY="## 🧾 Descrição\n\nCorreção urgente.\n\n## 🧪 Como testar\n...\n## ✅ Checklist"
          gh pr create --base main --head "${{ github.ref_name }}" --title "$PR_TITLE" --body "$PR_BODY" --label "hotfix" || echo "PR already exists"
