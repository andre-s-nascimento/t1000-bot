name: Sync develop after release

on:
  push:
    branches:
      - main

jobs:
  sync-develop:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'Merge pull request') && contains(github.event.head_commit.message, 'release/')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Create PR to sync develop
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create --base develop --head main --title "chore: sync main into develop after release" --body "Sincronização automática" --label "sync" || echo "PR already exists"
